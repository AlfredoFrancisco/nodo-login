<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODO - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Milliard';
            src: url('Assets/milliard/Rene%20Bieder%20%20Milliard%20Bold.otf') format('opentype');
            font-weight: 700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background: #101820;
            overflow: hidden;
        }

        .login-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Panel Izquierdo */
        .login-sidebar {
            width: 35%;
            min-width: 420px;
            background: #101820;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 96px 88px 32px;
            color: #FFF;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0, 0, 0, .5);
        }

        /* Contenedor principal: Logo + Textos + Formulario + Colaboración */
        /* Usa gap para espaciar TODO exactamente 32px */
        .sidebar-main {
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        .login-title {
            font-family: 'Milliard', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #A0AAB5;
        }

        .login-form-group {
            margin-bottom: 20px;
        }

        .login-form-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #FFF;
            margin-bottom: 4px;
        }

        .login-form-input {
            width: 100%;
            padding: 14px 16px;
            background: #FFF;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: box-shadow .3s;
        }

        .login-form-input:focus {
            box-shadow: 0 0 0 3px rgba(255, 102, 71, .3);
        }

        .password-input-group {
            position: relative;
        }

        .password-toggle-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #1A56DB;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #FF6647;
            color: #FFF;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            cursor: pointer;
            transition: .3s;
        }

        .login-btn:hover {
            background: #E55A3D;
        }

        .login-btn:active {
            transform: scale(.98);
        }

        .forgot-password {
            display: block;
            text-align: right;
            margin-top: 10px;
            font-size: 14px;
            color: #FF6647;
            text-decoration: none;
            font-weight: 700;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .collab-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #A0AAB5;
        }

        .copyright-section {
            text-align: center;
            color: #6B7280;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* Panel Derecho */
        .login-image-area {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(1);
            transition: opacity 1.5s ease-in-out, transform 8s ease-out;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1.05);
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(0, 0, 0, .85), transparent);
            z-index: 5;
            pointer-events: none;
        }

        .quote-container {
            position: absolute;
            bottom: 96px;
            left: 72px;
            z-index: 10;
            display: flex;
            gap: 24px;
        }

        .quote-line {
            width: 5px;
            background: #FF6647;
            border-radius: 3px;
        }

        .quote-text {
            color: #FFF;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: .5px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, .8);
            max-width: 700px;
        }

        /* Responsive Tablet (768px a 1024px) */
        @media (min-width: 768px) and (max-width: 1024px) {
            .login-sidebar {
                width: 45%;
                min-width: 380px;
                padding: 64px 48px 32px;
            }

            .login-image-area {
                width: 55%;
            }

            .quote-container {
                left: 40px;
                bottom: 64px;
                right: 40px;
            }

            .quote-text {
                font-size: 20px;
            }
        }

        /* Responsive Mobile (Hasta 767px) */
        @media (max-width: 767px) {

            body,
            html {
                overflow: hidden;
            }

            .login-wrapper {
                flex-direction: column;
                height: 100vh;
            }

            .login-sidebar {
                width: 100%;
                min-width: 100%;
                min-height: 100vh;
                padding: 32px 24px;
                box-shadow: none;
                justify-content: space-between;
            }

            .sidebar-main {
                gap: 20px;
                margin: auto 0;
            }

            .login-image-area {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">

        <div class="login-sidebar">

            <div class="sidebar-main">
                <img src="Assets/Logo-nodo-rgb 1.svg" alt="NODO" style="height: 48px; max-width: max-content;">

                <div>
                    <h1 class="login-title">Iniciar Sesión</h1>
                    <p class="login-subtitle">Accede a la plataforma de gestión cooperativa.</p>
                </div>

                <form>
                    <div class="login-form-group">
                        <label class="login-form-label">Usuario o email</label>
                        <input type="text" class="login-form-input" required>
                    </div>

                    <div class="login-form-group">
                        <label class="login-form-label">Contraseña</label>
                        <div class="password-input-group">
                            <input type="password" class="login-form-input" value="*********" required id="pwdInput">
                            <i class="fa-solid fa-eye-slash password-toggle-icon" id="togglePwd"></i>
                        </div>
                        <a href="#" class="forgot-password">¿Olvidó su contraseña?</a>
                    </div>

                    <button type="button" class="login-btn">Entrar al sistema</button>
                </form>

                <div class="collab-section">
                    <span>En colaboración con:</span>
                    <img src="Assets/Logo-Ayuda en accion.svg" alt="Ayuda en Acción" style="height: 36px;">
                </div>
            </div>

            <div class="copyright-section">
                <span>Versión 2.0.0</span>
                <img src="Assets/Logo-tutator.svg" alt="Tutator" style="margin: 6px 0; width: 64px;">
                <span>Copyright © 2026 Foundation Tutator</span>
            </div>

        </div>

        <div class="login-image-area">
            <img src="Assets/Image-login-Nodo1.jpg" class="slide" alt="Nodo 1">
            <img src="Assets/Image-login-Nodo2.jpg" class="slide" alt="Nodo 2">
            <img src="Assets/Image-login-Nodo3.jpg" class="slide" alt="Nodo 3">
            <img src="Assets/Image-login-Nodo4.jpg" class="slide" alt="Nodo 4">
            <div class="image-overlay"></div>
            <div class="quote-container">
                <div class="quote-line"></div>
                <p class="quote-text">"Tu Huella, Tu Oportunidad.<br>Transformando juntos la cadena de valor láctea en
                    Nicaragua."</p>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            let current = 0;

            setTimeout(() => {
                slides[current].classList.add('active');
            }, 50);

            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 6000);

            const pwdInput = document.getElementById('pwdInput');
            document.getElementById('togglePwd').addEventListener('click', function () {
                pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });
    </script>
</body>

</html>
